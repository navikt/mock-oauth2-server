name: Build Docs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  dokka:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout latest code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'gradle'

      - name: Get the tag name
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Build Dokka
        run: ./gradlew dokkaGenerateHtml -Pversion=${{ env.VERSION }}

      - name: Publish documentation
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # ratchet:JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: build/dokka/html
          target-folder: docs
          commit-message: "doc: Add documentation for latest release: ${{ env.VERSION }}"
