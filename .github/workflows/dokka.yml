name: Build Docs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  dokka:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout latest code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # ratchet:actions/setup-java@v5.3.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'gradle'

      - name: Get the tag name
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Build Dokka
        run: ./gradlew dokkaGenerateHtml -Pversion=${{ env.VERSION }}

      - name: Publish documentation
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # ratchet:JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: build/dokka/html
          target-folder: docs
          commit-message: "doc: Add documentation for latest release: ${{ env.VERSION }}"
